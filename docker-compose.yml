version: '3.8'

services:
  # API Gateway
  gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - ms-auth
      - ms-lands
      - ms-valuation
    networks:
      - terreplus-network

  # Auth Service
  ms-auth:
    build: ./ms-auth
    ports:
      - "3001:3001"
    env_file:
      - ./ms-auth/.env
    depends_on:
      db-auth:
        condition: service_healthy
    networks:
      - terreplus-network

  # Lands Service
  ms-lands:
    build: ./ms-lands
    ports:
      - "3002:3002"
    env_file:
      - ./ms-lands/.env
    environment:
      - VALUATION_URL=http://ms-valuation:8000
    depends_on:
      db-lands:
        condition: service_healthy
      ms-valuation:
        condition: service_started
    networks:
      - terreplus-network

  # Valuation Service (ML)
  ms-valuation:
    build: ./ms-valuation
    ports:
      - "8000:8000"
    networks:
      - terreplus-network

  # Database Auth
  db-auth:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: terreplus_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - terreplus-network

  # Database Lands
  db-lands:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: terreplus_lands
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - lands-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - terreplus-network

networks:
  terreplus-network:
    driver: bridge

volumes:
  auth-data:
  lands-data: